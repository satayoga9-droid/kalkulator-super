<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate - WEB NUU V-1🦉</title>
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; }
        h1 { color: #3b82f6; text-align: center; margin-bottom: 30px; }
        textarea { width: 100%; padding: 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; margin: 10px 0; resize: vertical; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; }
        button { background: #3b82f6; cursor: pointer; font-size: 1.2em; }
        .lang-row { display: flex; gap: 10px; align-items: center; }
        .swap-btn { width: 50px; height: 50px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .result { margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .back { margin-bottom: 20px; }
        .back a { color: white; text-decoration: none; padding: 10px 20px; background: #3b82f6; border-radius: 50px; display: inline-block; }
    </style>
</head>
<body>
    <div class="back"><a href="../../">← Kembali</a></div>
    <div class="container">
        <h1>🌍 Google Translate</h1>
        <textarea id="sourceText" placeholder="Masukkan teks..." rows="4"></textarea>
        
        <div class="lang-row">
            <select id="fromLang">
                <option value="id">🇮🇩 Indonesia</option>
                <option value="en">🇬🇧 English</option>
                <option value="ja">🇯🇵 Japanese</option>
                <option value="ko">🇰🇷 Korean</option>
                <option value="zh">🇨🇳 Chinese</option>
            </select>
            <div class="swap-btn" onclick="swapLang()">🔄</div>
            <select id="toLang">
                <option value="en">🇬🇧 English</option>
                <option value="id">🇮🇩 Indonesia</option>
                <option value="ja">🇯🇵 Japanese</option>
                <option value="ko">🇰🇷 Korean</option>
                <option value="zh">🇨🇳 Chinese</option>
            </select>
        </div>
        
        <button onclick="translateText()">Terjemahkan</button>
        <div class="result" id="result"></div>
    </div>
    
    <script>
        async function translateText() {
            let text = document.getElementById('sourceText').value;
            let from = document.getElementById('fromLang').value;
            let to = document.getElementById('toLang').value;
            if(!text) return;
            document.getElementById('result').innerHTML = '⏳ Menerjemahkan...';
            try {
                let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`);
                let data = await res.json();
                document.getElementById('result').innerHTML = data[0][0][0];
            } catch { document.getElementById('result').innerHTML = '❌ Gagal'; }
        }
        
        function swapLang() {
            let from = document.getElementById('fromLang');
            let to = document.getElementById('toLang');
            [from.value, to.value] = [to.value, from.value];
        }
    </script>
</body>
</html>
