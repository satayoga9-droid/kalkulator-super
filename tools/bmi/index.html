<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Checker - WEB NUU V-1🦉</title>
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; }
        h1 { color: #3b82f6; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2em; }
        .result { margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; text-align: center; font-size: 1.3em; }
        .back { margin-bottom: 20px; }
        .back a { color: white; text-decoration: none; padding: 10px 20px; background: #3b82f6; border-radius: 50px; display: inline-block; }
    </style>
</head>
<body>
    <div class="back"><a href="../../">← Kembali</a></div>
    <div class="container">
        <h1>⚖️ BMI Checker</h1>
        <input type="number" id="berat" placeholder="Berat (kg)" step="0.1">
        <input type="number" id="tinggi" placeholder="Tinggi (cm)" step="0.1">
        <button onclick="hitungBMI()">Hitung BMI</button>
        <div class="result" id="result"></div>
    </div>
    <script>
        function hitungBMI() {
            let berat = parseFloat(document.getElementById('berat').value);
            let tinggi = parseFloat(document.getElementById('tinggi').value) / 100;
            if(!berat || !tinggi) { document.getElementById('result').innerHTML = 'Masukkan berat dan tinggi!'; return; }
            let bmi = berat / (tinggi * tinggi);
            let kategori = '';
            if(bmi < 18.5) kategori = 'Kurus';
            else if(bmi < 25) kategori = 'Normal';
            else if(bmi < 30) kategori = 'Gemuk';
            else kategori = 'Obesitas';
            document.getElementById('result').innerHTML = `BMI: ${bmi.toFixed(1)}<br>Kategori: ${kategori}`;
        }
    </script>
</body>
</html>
