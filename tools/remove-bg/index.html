<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Background - WEB NUU V-1🦉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .back-btn {
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        
        .back-btn:hover {
            background: #2563eb;
            transform: translateX(-5px);
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .upload-area {
            background: rgba(255,255,255,0.05);
            border: 3px dashed #3b82f6;
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin: 30px 0;
        }
        
        .upload-area:hover {
            background: rgba(59,130,246,0.1);
            transform: scale(1.02);
        }
        
        .upload-area i {
            font-size: 5em;
            color: #3b82f6;
            margin-bottom: 20px;
        }
        
        .preview-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 40px 0;
        }
        
        .preview-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        
        .preview-box h3 {
            margin-bottom: 15px;
            color: #3b82f6;
        }
        
        .preview-box img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        
        .download-btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        
        .download-btn:hover {
            background: #16a34a;
            transform: scale(1.05);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading i {
            font-size: 3em;
            color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="../../" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
            <h1>✂️ Remove Background</h1>
            <div></div>
        </div>
        
        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <h2>Klik untuk upload gambar</h2>
            <p>atau drag & drop file di sini</p>
            <p style="color: #94a3b8; margin-top: 10px;">Format: JPG, PNG, WEBP (Max 10MB)</p>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFile(this.files[0])">
        </div>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <i class="fas fa-spinner"></i>
            <p style="margin-top: 15px;">Memproses gambar dengan AI...</p>
        </div>
        
        <!-- Preview -->
        <div class="preview-area" id="preview" style="display:none;">
            <div class="preview-box">
                <h3>Original</h3>
                <img id="originalImg" src="">
            </div>
            <div class="preview-box">
                <h3>Tanpa Background (PNG)</h3>
                <img id="processedImg" src="">
                <button class="download-btn" onclick="downloadImage()">
                    <i class="fas fa-download"></i> Download PNG
                </button>
            </div>
        </div>
        
        <!-- Info -->
        <div class="info">
            <i class="fas fa-info-circle"></i>
            <p>API Key Remove.bg sudah aktif. Gambar akan diproses langsung tanpa watermark.</p>
        </div>
    </div>
    
    <script>
        const API_KEY = 'bkLBbzaXJwcar9W5WdDdQWF7';
        let processedBlob = null;
        
        async function handleFile(file) {
            if(!file) return;
            
            // Tampilkan preview original
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('originalImg').src = e.target.result;
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            // Siapkan form data
            const formData = new FormData();
            formData.append('image_file', file);
            formData.append('size', 'auto');
            
            try {
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: { 'X-Api-Key': API_KEY },
                    body: formData
                });
                
                if(!response.ok) {
                    const error = await response.text();
                    throw new Error(error);
                }
                
                processedBlob = await response.blob();
                const url = URL.createObjectURL(processedBlob);
                
                document.getElementById('processedImg').src = url;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('preview').style.display = 'grid';
                
            } catch(error) {
                alert('Error: ' + error.message);
                location.reload();
            }
        }
        
        function downloadImage() {
            if(processedBlob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(processedBlob);
                link.download = 'no-background.png';
                link.click();
            }
        }
    </script>
</body>
</html>
