<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>⚡ Reaction Master</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:90%;
max-width:420px;
text-align:center;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
margin-top:0;
font-size:26px;
}

.box{
margin-top:25px;
height:200px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
background:#1e293b;
transition:0.2s;
user-select:none;
}

.green{
background:#22c55e;
box-shadow:0 0 20px #22c55e;
}

.red{
background:#ef4444;
box-shadow:0 0 20px #ef4444;
}

.timer{
margin-top:10px;
height:8px;
background:#334155;
border-radius:10px;
overflow:hidden;
}

.timerFill{
height:100%;
width:100%;
background:#22c55e;
transition:width 0.1s linear;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:15px;
}

select{
padding:8px;
border-radius:8px;
margin-top:10px;
}

.stats{
margin-top:15px;
font-size:17px;
}

.rating{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="container">

<h1>⚡ Reaction Master</h1>

<select id="mode">
<option value="3000">Easy</option>
<option value="2000">Normal</option>
<option value="1200">Hard</option>
</select>

<div class="box" id="box">
Tekan MULAI
</div>

<button onclick="start()">Mulai</button>

<div class="timer">
<div class="timerFill" id="timer"></div>
</div>

<div class="stats">
Waktu: <span id="time">-</span> ms
<br>
Highscore: <span id="high">-</span> ms
</div>

<div class="rating" id="rating"></div>

</div>

<script>

let startTime=null
let waiting=false
let timerInterval
let maxTime=3000
let high=localStorage.getItem("reactionHigh")

if(high){
document.getElementById("high").innerText=high
}

function start(){

clearInterval(timerInterval)

const mode=document.getElementById("mode").value
maxTime=parseInt(mode)

const box=document.getElementById("box")

box.classList.remove("green","red")
box.innerText="Tunggu..."

waiting=true

let delay=Math.random()*3000+1000

setTimeout(()=>{

box.classList.add("green")
box.innerText="KLIK SEKARANG!"
startTime=Date.now()
waiting=false

startTimer()

},delay)

}

function startTimer(){

let time=maxTime

timerInterval=setInterval(()=>{

time-=10

document.getElementById("timer").style.width=
(time/maxTime*100)+"%"

if(time<=0){
clearInterval(timerInterval)
document.getElementById("box").innerText="Terlambat!"
}

},10)

}

document.getElementById("box").onclick=function(){

const box=this

if(waiting){
box.classList.add("red")
box.innerText="Terlalu cepat!"
return
}

if(!startTime)return

clearInterval(timerInterval)

let reaction=Date.now()-startTime

document.getElementById("time").innerText=reaction

let rating=""

if(reaction<150) rating="⚡ SUPERHUMAN"
else if(reaction<220) rating="🔥 PRO PLAYER"
else if(reaction<300) rating="👍 CEPAT"
else if(reaction<400) rating="🙂 NORMAL"
else rating="🐢 LAMBAT"

document.getElementById("rating").innerText=rating

if(!high || reaction<high){
high=reaction
localStorage.setItem("reactionHigh",reaction)
document.getElementById("high").innerText=reaction
}

box.classList.remove("green")
box.innerText="Main Lagi?"

startTime=null

}

</script>

</body>
</html>
