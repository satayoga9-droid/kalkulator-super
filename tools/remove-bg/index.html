<script>
    const API_KEY = 'bkLBbzaXJwcar9W5WdDdQWF7';
    let processedBlob = null;
    
    async function handleFile(file) {
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('originalImg').src = e.target.result;
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
        };
        reader.readAsDataURL(file);
        
        const formData = new FormData();
        formData.append('image_file', file);
        formData.append('size', 'auto');
        formData.append('type', 'auto'); // auto detect subject
        
        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': API_KEY },
                body: formData
            });
            
            if(!response.ok) throw new Error('Gagal proses');
            
            processedBlob = await response.blob();
            const url = URL.createObjectURL(processedBlob);
            
            document.getElementById('processedImg').src = url;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('preview').style.display = 'grid';
            
        } catch(error) {
            alert('Error: ' + error.message);
            location.reload();
        }
    }
    
    function downloadImage() {
        if(processedBlob) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(processedBlob);
            link.download = 'no-background.png';
            link.click();
        }
    }
</script>
