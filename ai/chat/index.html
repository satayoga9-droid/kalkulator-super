<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - WEB NUU V-1🦉</title>
    <style>
        body { margin:0; background:#0f172a; color:white; font-family:system-ui; display:flex; flex-direction:column; height:100vh; }
        .header { background:#1e293b; padding:15px; text-align:center; font-size:22px; font-weight:bold; border-bottom:1px solid #334155; }
        .chat { flex:1; overflow-y:auto; padding:20px; }
        .msg { padding:12px; border-radius:18px; margin:8px 0; max-width:80%; word-wrap:break-word; animation:fade 0.3s; }
        .user { background:#2563eb; margin-left:auto; }
        .ai { background:#334155; margin-right:auto; }
        .input-area { display:flex; gap:5px; padding:10px; background:#0f172a; border-top:1px solid #334155; }
        input { flex:1; padding:15px; border-radius:25px; border:none; background:#1e293b; color:white; font-size:16px; }
        button { padding:10px 20px; border-radius:25px; border:none; background:#2563eb; color:white; cursor:pointer; }
        .tools { display:flex; gap:5px; padding:10px; background:#0f172a; overflow-x:auto; }
        .tools button { background:#334155; padding:10px 15px; }
        .back { position:absolute; top:15px; left:15px; }
        .back a { color:white; text-decoration:none; padding:8px 15px; background:#2563eb; border-radius:20px; font-size:14px; }
        @keyframes fade { from { opacity:0; transform:translateY(10px); } to { opacity:1; } }
    </style>
</head>
<body>
    <div class="back"><a href="../../">← Kembali</a></div>
    <div class="header">🤖 AI Chat (Gemini)</div>
    
    <div class="tools">
        <button onclick="voice()">🎤 Voice</button>
        <button onclick="upload()">🖼 Upload</button>
        <button onclick="camera()">📷 Camera</button>
    </div>
    
    <div class="chat" id="chat"></div>
    
    <div class="input-area">
        <input id="text" placeholder="Tanya apa saja...">
        <button onclick="send()">➤</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCrnIKxENHK6y-PT6lJgRDh76fl6NMrzEY";
        const chat = document.getElementById("chat");
        
        function add(text, type) {
            let div = document.createElement("div");
            div.className = "msg " + type;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        async function send() {
            let text = document.getElementById("text").value;
            if (!text) return;
            
            add(text, "user");
            document.getElementById("text").value = "";
            add("⏳", "ai");
            
            try {
                let res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                
                let data = await res.json();
                document.querySelector(".ai:last-child").remove();
                
                if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                    add(data.candidates[0].content.parts[0].text, "ai");
                } else {
                    add("❌ Error: " + (data.error?.message || "Gagal"), "ai");
                }
            } catch (e) {
                document.querySelector(".ai:last-child").remove();
                add("❌ Error: " + e.message, "ai");
                add("⚠️ Fallback: AI offline. Coba lagi nanti.", "ai");
            }
        }
        
        function voice() {
            let rec = new webkitSpeechRecognition();
            rec.lang = "id-ID";
            rec.onresult = e => {
                document.getElementById("text").value = e.results[0][0].transcript;
                send();
            };
            rec.start();
        }
        
        function upload() {
            let input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.onchange = () => add("📷 Upload: " + input.files[0].name, "user");
            input.click();
        }
        
        function camera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    add("✅ Kamera aktif", "ai");
                    stream.getTracks().forEach(t => t.stop());
                })
                .catch(() => add("❌ Izin kamera ditolak. Klik untuk meminta ulang.", "ai"));
        }
        
        add("👋 Halo! Ada yang bisa dibantu?", "ai");
    </script>
</body>
</html>
