<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Game - WEB NUU V-1🦉</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
font-family:'Segoe UI',sans-serif;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

h1{
text-align:center;
color:#3b82f6;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.card{
height:80px;
background:#1e293b;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
transition:0.3s;
}

.card.flipped{
background:#3b82f6;
}

.stats{
text-align:center;
margin-top:15px;
font-size:14px;
}

.result{
margin-top:20px;
padding:20px;
background:rgba(0,0,0,0.3);
border-radius:10px;
text-align:center;
font-size:1.2em;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#3b82f6;
border:none;
border-radius:10px;
color:white;
font-size:1.1em;
cursor:pointer;
}

.back{
margin-bottom:20px;
}

.back a{
color:white;
text-decoration:none;
padding:10px 20px;
background:#3b82f6;
border-radius:50px;
}

</style>
</head>

<body>

<div class="back">
<a href="../../">← Kembali</a>
</div>

<div class="container">

<h1>🧠 Memory Game</h1>

<div class="grid" id="grid"></div>

<div class="stats">
Langkah: <span id="moves">0</span> |
Timer: <span id="timer">0</span>s
</div>

<button onclick="startGame()">Game Baru</button>

<div class="result" id="result"></div>

</div>

<script>

const iconSets = [

["🍎","🍌","🍇","🍉","🍓","🍍","🥝","🍒"],

["🐶","🐱","🐭","🐹","🐰","🦊","🐼","🐸"],

["⚽","🏀","🏈","⚾","🎾","🏐","🥏","🏓"],

["😀","😎","🤖","👻","💀","👽","👾","🎃"],

["🔥","⚡","🌪","🌊","🌙","☀️","⭐","🌈"]

]

let icons=[]
let first=null
let second=null
let lock=false
let moves=0
let match=0
let timer=0

setInterval(()=>{
timer++
document.getElementById("timer").innerText=timer
},1000)

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function startGame(){

let set = iconSets[Math.floor(Math.random()*iconSets.length)]

icons = [...set,...set]

let grid=document.getElementById("grid")
grid.innerHTML=""

moves=0
match=0
timer=0

document.getElementById("moves").innerText=0
document.getElementById("timer").innerText=0
document.getElementById("result").innerHTML=""

let cards=shuffle([...icons])

cards.forEach(icon=>{

let card=document.createElement("div")
card.className="card"
card.dataset.icon=icon
card.innerHTML="?"

card.onclick=()=>flip(card)

grid.appendChild(card)

})

}

function flip(card){

if(lock) return
if(card.classList.contains("flipped")) return

card.classList.add("flipped")
card.innerHTML=card.dataset.icon

if(!first){
first=card
return
}

second=card
lock=true

moves++
document.getElementById("moves").innerText=moves

if(first.dataset.icon===second.dataset.icon){

match++
first=null
second=null
lock=false

if(match===8){
document.getElementById("result").innerHTML="🎉 Kamu menang!"
}

}

else{

setTimeout(()=>{

first.classList.remove("flipped")
second.classList.remove("flipped")

first.innerHTML="?"
second.innerHTML="?"

first=null
second=null
lock=false

},700)

}

}

startGame()

</script>

</body>
</html>
