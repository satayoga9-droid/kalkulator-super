<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tebak Angka - WEB NUU V-1🦉</title>

<style>

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
font-family:'Segoe UI',sans-serif;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
text-align:center;
color:#3b82f6;
margin-bottom:10px;
}

p{
text-align:center;
opacity:0.8;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
font-size:16px;
text-align:center;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#3b82f6;
border:none;
border-radius:12px;
color:white;
font-size:1.1em;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2563eb;
transform:scale(1.03);
}

.result{
margin-top:20px;
padding:20px;
background:rgba(0,0,0,0.3);
border-radius:12px;
text-align:center;
font-size:1.3em;
min-height:40px;
}

.stats{
margin-top:15px;
text-align:center;
font-size:14px;
opacity:0.9;
}

.progress{
height:10px;
background:rgba(255,255,255,0.1);
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:0.5s;
}

.win{
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #22c55e;}
to{box-shadow:0 0 30px #22c55e;}
}

.back{
margin-bottom:20px;
}

.back a{
color:white;
text-decoration:none;
padding:10px 20px;
background:#3b82f6;
border-radius:50px;
}

</style>
</head>

<body>

<div class="back">
<a href="../../">← Kembali</a>
</div>

<div class="container" id="game">

<h1>🎯 Tebak Angka</h1>
<p>Tebak angka dari <b>1 - 100</b></p>

<input type="number" id="guess" placeholder="Masukkan tebakan">

<button onclick="cek()">Tebak</button>
<button onclick="resetGame()">Main Lagi</button>

<div class="result" id="result"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="stats">
Percobaan: <span id="attempt">0</span> |
Timer: <span id="timer">0</span>s <br>
🏆 High Score: <span id="best">-</span>
</div>

</div>

<script>

let angka = Math.floor(Math.random()*100)+1
let percobaan = 0
let timer = 0

let best = localStorage.getItem("bestScore")
if(best) document.getElementById("best").innerText = best

setInterval(()=>{
timer++
document.getElementById("timer").innerText = timer
},1000)

function cek(){

let tebakan = Number(document.getElementById("guess").value)
let result = document.getElementById("result")

if(!tebakan){
result.innerHTML="Masukkan angka dulu!"
return
}

if(tebakan < 1 || tebakan > 100){
result.innerHTML="Angka harus 1 - 100"
return
}

percobaan++
document.getElementById("attempt").innerText = percobaan

let jarak = Math.abs(angka - tebakan)
let progress = Math.max(0,100 - jarak)

document.getElementById("bar").style.width = progress+"%"

if(tebakan < angka){
result.innerHTML="⬆️ Terlalu kecil"
}

else if(tebakan > angka){
result.innerHTML="⬇️ Terlalu besar"
}

else{

result.innerHTML="🎉 BENAR! Kamu menang!"

document.getElementById("game").classList.add("win")

let bestScore = localStorage.getItem("bestScore")

if(!bestScore || percobaan < bestScore){
localStorage.setItem("bestScore", percobaan)
document.getElementById("best").innerText = percobaan
}

}

}

function resetGame(){

angka = Math.floor(Math.random()*100)+1
percobaan = 0
timer = 0

document.getElementById("attempt").innerText=0
document.getElementById("timer").innerText=0
document.getElementById("bar").style.width="0%"
document.getElementById("result").innerHTML=""
document.getElementById("guess").value=""

document.getElementById("game").classList.remove("win")

}

</script>

</body>
</html>
